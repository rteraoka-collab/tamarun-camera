<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" name="viewport"/>
<title>たまルン スキャン</title>
<!-- Tailwind, Fonts, Icons -->
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<!-- html5-qrcode -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/html5-qrcode/2.3.8/html5-qrcode.min.js"></script>
<script id="tailwind-config">
tailwind.config = {
  darkMode: "class",
  theme: {
    extend: {
      "colors": {
        "background": "#f9f9f6",
        "primary": "#805600",
        "surface-container": "#eeeeeb",
        "error": "#ba1a1a",
        "error-container": "#ffdad6",
      },
      "fontFamily": {
        "body-md": ["Plus Jakarta Sans"],
        "title-sm": ["Plus Jakarta Sans"],
        "headline-md": ["Plus Jakarta Sans"],
        "label-caps": ["Plus Jakarta Sans"]
      }
    }
  }
}
</script>
<style>
  .glass-card {
      background: rgba(255, 255, 255, 0.7);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.2);
      box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.04);
  }
  .active-glow {
      box-shadow: 0 0 15px 2px rgba(240, 165, 0, 0.5);
      border: 2px solid #f0a500 !important;
      background: linear-gradient(135deg, rgba(255,255,255,0.9), rgba(255,243,205,0.9));
  }
  .material-symbols-outlined {
      font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
      vertical-align: middle;
  }
  /* QR Code Reader styling fixes */
  #reader video {
      border-radius: 1rem;
      object-fit: cover;
  }
  #reader { border: none !important; }
</style>
</head>
<body class="bg-background text-slate-800 font-body-md min-h-screen pb-24 touch-manipulation">

<!-- TopAppBar -->
<header class="fixed top-0 left-0 w-full z-40 flex flex-col justify-center px-4 h-16 bg-white/80 backdrop-blur-xl border-b border-white/20 shadow-sm">
  <div class="flex justify-between items-center w-full">
    <div class="flex items-center gap-2">
      <span class="material-symbols-outlined text-amber-500">restaurant</span>
      <h1 class="font-bold text-lg text-amber-600 tracking-tight">Tamarun Shokudo</h1>
    </div>
    <!-- Status Bar -->
    <div class="flex gap-3 mt-1 items-center">
      <div class="flex items-center gap-1 bg-emerald-50 px-2 py-0.5 rounded-full">
        <span class="w-1.5 h-1.5 bg-emerald-500 rounded-full animate-pulse"></span>
        <span class="text-[9px] font-bold text-emerald-700 uppercase tracking-widest">オンライン</span>
      </div>
      <span id="statusTime" class="text-xs font-bold text-slate-500 font-mono">--:--:--</span>
    </div>
  </div>
</header>

<!-- Toast Notification Layer -->
<div id="toast" class="fixed top-20 left-1/2 -translate-x-1/2 z-50 p-4 rounded-xl shadow-2xl transition-all duration-300 opacity-0 pointer-events-none transform -translate-y-4 max-w-sm w-11/12 border flex items-start gap-4">
</div>

<!-- Processing Overlay -->
<div id="processingOverlay" class="fixed inset-0 bg-slate-900/40 backdrop-blur-sm z-50 hidden flex-col items-center justify-center transition-all duration-300">
  <div class="glass-card p-6 rounded-2xl flex flex-col items-center gap-3">
    <span class="material-symbols-outlined animate-spin text-amber-500 text-4xl" style="font-variation-settings: 'FILL' 1;">refresh</span>
    <p class="text-sm font-bold text-slate-700 tracking-widest">読込中...</p>
  </div>
</div>

<main class="pt-20 px-4 space-y-4 max-w-lg mx-auto">
  <!-- Menu Grid -->
  <section class="grid grid-cols-2 gap-3" id="menuGrid">
    <div class="col-span-2 text-center text-slate-400 text-sm py-4">読込中...</div>
  </section>

  <!-- Scan Area -->
  <section class="relative group mt-2">
    <div class="w-full aspect-[4/3] bg-slate-900 rounded-2xl overflow-hidden relative border-4 border-white/50 shadow-xl">
      <div id="reader" class="absolute inset-0 w-full h-full z-10 box-border"></div>
      
      <!-- Decorative Frame Overlay -->
      <div class="absolute inset-0 z-20 pointer-events-none flex flex-col items-center justify-center">
        <div id="scanFrame" class="w-64 h-32 border-2 border-white/30 rounded-xl relative transition-all duration-500 opacity-50">
          <div class="absolute -top-1 -left-1 w-6 h-6 border-t-4 border-l-4 border-amber-500 rounded-tl-lg"></div>
          <div class="absolute -top-1 -right-1 w-6 h-6 border-t-4 border-r-4 border-amber-500 rounded-tr-lg"></div>
          <div class="absolute -bottom-1 -left-1 w-6 h-6 border-b-4 border-l-4 border-amber-500 rounded-bl-lg"></div>
          <div class="absolute -bottom-1 -right-1 w-6 h-6 border-b-4 border-r-4 border-amber-500 rounded-br-lg"></div>
          <div class="w-full h-[1px] bg-amber-500/80 absolute top-1/2 -translate-y-1/2 shadow-[0_0_10px_#f0a500] animate-pulse"></div>
        </div>
        <div class="absolute bottom-3 left-0 w-full text-center">
          <p class="text-white/90 text-[10px] font-bold tracking-widest bg-black/40 inline-block px-3 py-1 rounded-full">バーコードを合わせてください</p>
        </div>
      </div>
    </div>
  </section>

  <!-- Action Buttons -->
  <section class="flex gap-2">
    <button id="startBtn" onclick="startScan()" class="flex-1 h-14 bg-gradient-to-r from-amber-500 to-orange-500 text-white font-bold text-sm tracking-wide rounded-xl shadow-lg shadow-orange-500/30 active:scale-[0.98] transition-all flex items-center justify-center gap-2">
      <span class="material-symbols-outlined">photo_camera</span>
      スキャン開始
    </button>
    <button id="stopBtn" onclick="stopScan()" class="w-16 h-14 glass-card text-red-500 font-bold rounded-xl active:scale-[0.98] transition-all flex items-center justify-center border-red-100" style="display:none">
      <span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">stop_circle</span>
    </button>
  </section>
</main>

<!-- Bottom Nav (Links to Admin) -->
<nav class="fixed bottom-0 left-0 w-full z-40 flex justify-around items-center px-2 py-2 pb-safe bg-white/80 backdrop-blur-2xl rounded-t-2xl border-t border-slate-200/50 shadow-[0_-4px_12px_rgba(0,0,0,0.03)]">
  <div class="flex flex-col items-center justify-center text-amber-600 scale-105 transition-transform duration-200 cursor-pointer">
    <span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">qr_code_scanner</span>
    <span class="text-[9px] font-bold uppercase tracking-wider mt-0.5">スキャン</span>
  </div>
  <a href="admin.html" class="flex flex-col items-center justify-center text-slate-400 hover:text-slate-600 transition-colors duration-200 cursor-pointer p-2">
    <span class="material-symbols-outlined">dashboard</span>
    <span class="text-[9px] font-bold uppercase tracking-wider mt-0.5">管理者</span>
  </a>
</nav>

<script src="config.js"></script>
<script>
let html5QrcodeScanner = null;
let scanning = false;
let selectedMenu = null;
let menuData = {};
let processing = false;
let audioCtx = null;

// Init AudioContext on user interaction
function initAudio() {
  if (!audioCtx) {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  }
  if (audioCtx.state === 'suspended') {
    audioCtx.resume();
  }
}

// Play sound
function playSound(type) {
  if (!audioCtx) return;
  
  if (type === 'success') {
    // 成功音：「ピンポン・ピンポン」
    playTone(1318.51, 'sine', 0, 0.2, 0.3);      // ピン (E6)
    playTone(1046.50, 'sine', 0.25, 0.3, 0.3);   // ポン (C6)
    playTone(1318.51, 'sine', 0.65, 0.2, 0.3);   // ピン (E6)
    playTone(1046.50, 'sine', 0.9, 0.3, 0.3);    // ポン (C6)
  } else if (type === 'error') {
    // 失敗音：「ブブー」
    playTone(150, 'square', 0, 0.3, 0.2);        // ブ (長め)
    playTone(150, 'square', 0.4, 0.5, 0.2);      // ブー (さらに長め)
  }
}

// 汎用の音作り関数
function playTone(freq, type, startTimeOffset, duration, vol) {
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  const startTime = audioCtx.currentTime + startTimeOffset;
  
  osc.type = type;
  osc.frequency.setValueAtTime(freq, startTime);
  
  osc.connect(gain);
  gain.connect(audioCtx.destination);
  
  // プツッというノイズを防ぐためにフェードイン・フェードアウト
  gain.gain.setValueAtTime(0, startTime);
  gain.gain.linearRampToValueAtTime(vol, startTime + 0.02);
  gain.gain.exponentialRampToValueAtTime(0.01, startTime + duration);
  
  osc.start(startTime);
  osc.stop(startTime + duration);
}

// Clock
setInterval(() => {
  document.getElementById('statusTime').textContent = new Date().toLocaleTimeString('ja-JP', { hour12: false });
}, 1000);

// Fetch UI Elements
function loadMenuStatus() {
  fetch(`${GAS_URL}?action=getMenuStatus`)
    .then(r => r.json())
    .then(data => { if(data.success) renderMenus(data.menus); })
    .catch(err => console.error(err));
}

function renderMenus(menus) {
  const grid = document.getElementById('menuGrid');
  grid.innerHTML = '';
  
  menus.forEach(m => {
    menuData[m.id] = m;
    const remain = m.remain || 0;
    const isSoldOut = remain <= 0;
    const isSelected = selectedMenu === m.id;
    
    // Status text rendering
    let statusText, statusClass;
    if (isSoldOut) { statusText = 'SOLD OUT'; statusClass = 'text-red-500'; }
    else if (remain <= 5) { statusText = 'LOW STOCK'; statusClass = 'text-red-500'; }
    else if (isSelected) { statusText = 'SELECTED'; statusClass = 'text-amber-600'; }
    else { statusText = 'STANDBY'; statusClass = 'text-slate-400'; }
    
    // Base styles
    let baseClass = 'glass-card p-3 rounded-xl text-left transition-all duration-300 flex flex-col justify-between h-28 relative overflow-hidden ';
    if (isSelected) baseClass += 'active-glow shadow-md transform -translate-y-0.5';
    else if (isSoldOut) baseClass += 'opacity-50 grayscale pointer-events-none';
    else baseClass += 'hover:bg-white border-white/50';

    const checkIcon = isSelected ? `<div class="absolute top-1 right-1 p-1"><span class="material-symbols-outlined text-amber-500 text-sm" style="font-variation-settings: 'FILL' 1;">check_circle</span></div>` : '';
    const numberColor = (isSoldOut || remain <= 5) ? 'text-red-500' : (isSelected ? 'text-amber-700' : 'text-slate-800');

    // Menu Item Builder
    const btn = document.createElement('button');
    btn.className = baseClass;
    btn.onclick = () => { selectMenu(m.id); };
    btn.innerHTML = `
      ${checkIcon}
      <div class="space-y-0.5 mt-0.5">
        <span class="text-[9px] font-bold uppercase tracking-widest ${statusClass}">${statusText}</span>
        <h3 class="font-bold text-sm tracking-tight text-slate-800 leading-tight">${m.name}</h3>
      </div>
      <div class="flex justify-between items-end w-full">
        <div class="text-[10px] text-slate-400 font-medium tracking-wide">上限 ${m.limit}</div>
        <div class="text-right leading-none">
          <span class="text-[10px] text-slate-500 font-bold mr-0.5">残</span>
          <span class="text-2xl font-black ${numberColor} tracking-tighter">${remain}</span>
        </div>
      </div>
    `;
    grid.appendChild(btn);
  });
}

function selectMenu(id) {
  selectedMenu = id;
  // Re-render
  renderMenus(Object.values(menuData));
}

// Scanning
function startScan() {
  if (scanning) return;
  initAudio();
  scanning = true;
  document.getElementById('startBtn').style.display = 'none';
  document.getElementById('stopBtn').style.display  = 'flex';
  document.getElementById('scanFrame').classList.remove('opacity-50');
  
  html5QrcodeScanner = new Html5Qrcode('reader');
  html5QrcodeScanner.start(
    { facingMode: 'environment' },
    { fps: 15, qrbox: { width: 250, height: 120 }, formatsToSupport: [Html5QrcodeSupportedFormats.CODE_128, Html5QrcodeSupportedFormats.EAN_13, Html5QrcodeSupportedFormats.QR_CODE] },
    onScanSuccess,
    () => {} // ignore empty frames
  ).catch(err => {
    showResult('error', 'カメラエラー', 'カメラを起動できませんでした。手動入力をご利用ください。');
    stopScan();
  });
}

function stopScan() {
  scanning = false;
  document.getElementById('startBtn').style.display = 'flex';
  document.getElementById('stopBtn').style.display  = 'none';
  document.getElementById('scanFrame').classList.add('opacity-50');
  
  if (html5QrcodeScanner) {
    html5QrcodeScanner.stop().catch(() => {});
    html5QrcodeScanner = null;
  }
}

function onScanSuccess(decodedText) {
  if (processing) return;
  stopScan();
  processCard(decodedText);
}

// Processing
async function processCard(cardId) {
  if (processing) return;
  if (!selectedMenu) {
    showResult('error', 'メニュー未選択', '先に定食を選択してください', cardId);
    playSound('error');
    return;
  }
  processing = true;
  document.getElementById('processingOverlay').classList.remove('hidden');
  document.getElementById('processingOverlay').classList.add('flex');

  try {
    const res = await fetch(GAS_URL, {
      method: 'POST',
      body: JSON.stringify({ cardId, menuId: selectedMenu })
    });
    
    const data = await res.json();
    processing = false;
    document.getElementById('processingOverlay').classList.add('hidden');
    document.getElementById('processingOverlay').classList.remove('flex');
    
    let reloadDelay = 3500; // time before reload
    
    if (data.success) {
      showResult('success', '受付完了', `${data.menuName}\n${data.currentCount} / ${data.limit} 食 を受け付けました`, cardId);
      playSound('success');
      if(navigator.vibrate) navigator.vibrate([200]);
    } else if (data.code === 'DUPLICATE') {
      showResult('error', '重複読取エラー', data.message, cardId); 
      playSound('error');
      if(navigator.vibrate) navigator.vibrate([100, 50, 100]);
    } else {
      showResult('error', 'エラー発生', data.message || '処理に失敗しました', cardId);
      playSound('error');
      if(navigator.vibrate) navigator.vibrate([300]);
    }
    
    // 一度読み込んだらリロードする
    setTimeout(() => {
      window.location.reload();
    }, reloadDelay);
    
  } catch (err) {
    processing = false;
    document.getElementById('processingOverlay').classList.add('hidden');
    document.getElementById('processingOverlay').classList.remove('flex');
    showResult('error', '通信エラー', err.message || 'ネットワーク接続を確認してください', cardId);
    playSound('error');
    
    setTimeout(() => { window.location.reload(); }, 3500);
  }
}

// Toast
function showResult(type, title, detail, cardId = '') {
  const toast = document.getElementById('toast');
  let colorClass, bgClass, icon;
  
  if (type === 'success') {
    colorClass = 'text-emerald-700'; bgClass = 'bg-emerald-50 border-emerald-200'; icon = 'check_circle';
  } else if (type === 'error') {
    colorClass = 'text-red-700'; bgClass = 'bg-red-50 border-red-200'; icon = 'error';
  } else {
    colorClass = 'text-amber-700'; bgClass = 'bg-amber-50 border-amber-200'; icon = 'sync';
  }
  
  toast.className = `fixed top-20 left-1/2 -translate-x-1/2 z-50 p-4 rounded-xl shadow-2xl transition-all duration-300 transform translate-y-0 opacity-100 max-w-[90%] w-full border ${bgClass} flex items-start gap-3 backdrop-blur-md`;
  
  toast.innerHTML = `
    <div class="${colorClass} mt-0.5"><span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">${icon}</span></div>
    <div class="flex-1">
      <h4 class="font-bold text-sm ${colorClass} tracking-tight">${title}</h4>
      <p class="text-[11px] font-medium text-slate-600 mt-1 leading-relaxed whitespace-pre-wrap">${detail}</p>
      ${cardId ? `<div class="mt-2 text-[10px] font-mono text-slate-500 bg-black/5 px-2 py-0.5 rounded inline-block">ID: ${cardId}</div>` : ''}
    </div>
  `;
  
  if (window.toastTimer) clearTimeout(window.toastTimer);
  window.toastTimer = setTimeout(() => {
      toast.classList.remove('translate-y-0', 'opacity-100');
      toast.classList.add('-translate-y-4', 'opacity-0', 'pointer-events-none');
  }, 4000);
}

// Init
loadMenuStatus();
setInterval(loadMenuStatus, 30000);

</script>
</body>
</html>
