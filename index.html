<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" name="viewport"/>
<title>たまルン スキャン</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html5-qrcode/2.3.8/html5-qrcode.min.js"></script>
<script>
tailwind.config = {
  darkMode: "class",
  theme: {
    extend: {
      colors: {
        background: "#f9f9f6",
        primary: "#805600",
        "surface-container": "#eeeeeb",
        error: "#ba1a1a",
        "error-container": "#ffdad6",
      },
      fontFamily: { "body-md": ["Plus Jakarta Sans"] }
    }
  }
}
</script>
<style>
  .glass-card {
    background: rgba(255,255,255,0.7);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border: 1px solid rgba(255,255,255,0.2);
    box-shadow: 0 8px 32px 0 rgba(0,0,0,0.04);
  }
  .active-glow {
    box-shadow: 0 0 15px 2px rgba(240,165,0,0.5);
    border: 2px solid #f0a500 !important;
    background: linear-gradient(135deg,rgba(255,255,255,0.9),rgba(255,243,205,0.9));
  }
  .material-symbols-outlined {
    font-variation-settings: 'FILL' 0,'wght' 400,'GRAD' 0,'opsz' 24;
    vertical-align: middle;
  }

  /*
    ============================================================
    【修正1】スキャン枠のズレ対策
    ============================================================
    html5-qrcode は内部で以下の構造を生成する:
      #reader
        └ <div>  ← ライブラリが作る wrapper
            └ <video>
            └ <canvas> ← 実際の読み取りエリア(qrbox)はここを基準に計算

    問題: iPhone Safari では video の実際の映像サイズと
          CSS上のサイズが一致しないことがあり、
          ライブラリが計算するqrboxの位置がズレる。

    解決策:
    1. #reader の video に object-fit:cover + width/height:100% を強制
       → 映像がコンテナを完全に埋め、ライブラリの座標計算と一致する
    2. html5-qrcode が生成する内部 div にも同様のスタイルを適用
    3. 装飾の枠UI（scanFrame）は完全に非表示にして
       ライブラリが表示する実際のqrboxを使う
    ============================================================
  */

  /* html5-qrcode が生成する要素を強制的にコンテナに合わせる */
  #reader {
    border: none !important;
    width: 100% !important;
    height: 100% !important;
    position: absolute !important;
    inset: 0 !important;
  }
  #reader > div {
    width: 100% !important;
    height: 100% !important;
    padding: 0 !important;
  }
  #reader video {
    width: 100% !important;
    height: 100% !important;
    object-fit: cover !important;
    border-radius: 1rem !important;
    position: absolute !important;
    inset: 0 !important;
  }
  /* ライブラリが描画するqrboxの枠線を見やすく */
  #reader canvas {
    position: absolute !important;
    inset: 0 !important;
    width: 100% !important;
    height: 100% !important;
  }
  /* ライブラリが生成するスキャン枠をアンバー色に */
  #qr-shaded-region {
    border: none !important;
  }

  @supports (padding-bottom: env(safe-area-inset-bottom)) {
    .pb-safe { padding-bottom: max(0.5rem, env(safe-area-inset-bottom)); }
  }

  /* メニュー未選択時のスタートボタン（グレーアウト） */
  #startBtn.disabled {
    background: linear-gradient(135deg, #94a3b8, #64748b);
    box-shadow: none;
    cursor: not-allowed;
    opacity: 0.7;
  }

  /* メニュー未選択の警告バナー */
  #menuWarning {
    transition: all 0.3s ease;
  }
</style>
</head>

<body class="bg-background text-slate-800 font-body-md min-h-screen pb-24 touch-manipulation">

<!-- Header -->
<header class="fixed top-0 left-0 w-full z-40 flex flex-col justify-center px-4 h-16
               bg-white/80 backdrop-blur-xl border-b border-white/20 shadow-sm">
  <div class="flex justify-between items-center w-full">
    <div class="flex items-center gap-2">
      <span class="material-symbols-outlined text-amber-500">restaurant</span>
      <h1 class="font-bold text-lg text-amber-600 tracking-tight">Tamarun Shokudo</h1>
    </div>
    <div class="flex gap-3 items-center">
      <div class="flex items-center gap-1 bg-emerald-50 px-2 py-0.5 rounded-full">
        <span class="w-1.5 h-1.5 bg-emerald-500 rounded-full animate-pulse"></span>
        <span class="text-[9px] font-bold text-emerald-700 uppercase tracking-widest">オンライン</span>
      </div>
      <span id="statusTime" class="text-xs font-bold text-slate-500 font-mono">--:--:--</span>
    </div>
  </div>
</header>

<!-- Toast -->
<div id="toast"
     class="fixed top-20 left-1/2 -translate-x-1/2 z-50 p-4 rounded-xl shadow-2xl
            transition-all duration-300 opacity-0 pointer-events-none
            -translate-y-4 max-w-sm w-11/12 border flex items-start gap-4"></div>

<!-- Processing Overlay -->
<div id="processingOverlay"
     class="fixed inset-0 bg-slate-900/40 backdrop-blur-sm z-50 hidden flex-col items-center justify-center">
  <div class="glass-card p-6 rounded-2xl flex flex-col items-center gap-3">
    <span class="material-symbols-outlined animate-spin text-amber-500 text-4xl"
          style="font-variation-settings:'FILL' 1;">refresh</span>
    <p class="text-sm font-bold text-slate-700 tracking-widest">読込中...</p>
  </div>
</div>

<main class="pt-20 px-4 space-y-4 max-w-lg mx-auto">

  <!-- ① メニュー選択 -->
  <section>
    <!-- 未選択時の警告 -->
    <div id="menuWarning"
         class="mb-2 flex items-center gap-2 bg-amber-50 border border-amber-200
                rounded-xl px-3 py-2 text-amber-700 text-xs font-bold">
      <span class="material-symbols-outlined text-base text-amber-500"
            style="font-variation-settings:'FILL' 1;">warning</span>
      定食を選択してからスキャンしてください
    </div>
    <div class="grid grid-cols-2 gap-3" id="menuGrid">
      <div class="col-span-2 text-center text-slate-400 text-sm py-4">読込中...</div>
    </div>
  </section>

  <!-- ② スキャンエリア -->
  <section class="mt-2">
    <!--
      コンテナの高さを固定して、内部の video が
      コンテナをはみ出さないようにする。
      aspect-[4/3] を使わず h-64 で固定することで
      iPhone での映像サイズ計算が安定する。
    -->
    <div id="cameraContainer"
         class="relative w-full h-64 bg-slate-900 rounded-2xl overflow-hidden
                border-4 border-white/50 shadow-xl">

      <!-- html5-qrcode が video を挿入する div -->
      <!-- z-index を低くして、ライブラリのqrbox枠が前面に出るようにする -->
      <div id="reader"></div>

      <!--
        カメラ停止中のプレースホルダー
        スキャン開始後は JS で非表示にする
      -->
      <div id="cameraPlaceholder"
           class="absolute inset-0 z-30 flex flex-col items-center justify-center
                  bg-slate-900 gap-3">
        <span class="material-symbols-outlined text-5xl text-slate-600">photo_camera</span>
        <p id="placeholderText"
           class="text-xs font-bold tracking-widest text-slate-500">
          <!-- JS で文言を切り替える -->
          スキャン開始を押してください
        </p>
      </div>
    </div>
  </section>

  <!-- ボタン -->
  <section class="flex gap-2">
    <!--
      【修正2】メニュー未選択時はボタンをグレーアウトして
      タップしても startScan() が動かないようにする
    -->
    <button id="startBtn" onclick="startScan()"
            class="disabled flex-1 h-14 bg-gradient-to-r from-amber-500 to-orange-500
                   text-white font-bold text-sm tracking-wide rounded-xl
                   shadow-lg shadow-orange-500/30 active:scale-[0.98]
                   transition-all flex items-center justify-center gap-2">
      <span class="material-symbols-outlined">photo_camera</span>
      <span id="startBtnText">定食を選んでください</span>
    </button>
    <button id="stopBtn" onclick="stopScan()"
            style="display:none"
            class="w-16 h-14 glass-card text-red-500 font-bold rounded-xl
                   active:scale-[0.98] transition-all flex items-center justify-center border-red-100">
      <span class="material-symbols-outlined" style="font-variation-settings:'FILL' 1;">stop_circle</span>
    </button>
  </section>

  <!-- 手動入力 -->
  <section class="glass-card rounded-xl p-3 border border-white/50 flex gap-2">
    <input id="manualCardId" type="text" inputmode="numeric"
           placeholder="手動入力：カードID"
           class="flex-1 bg-transparent text-sm font-bold text-slate-700
                  placeholder-slate-300 outline-none border-none focus:ring-0 p-1"/>
    <button onclick="manualScan()"
            class="px-4 py-2 bg-slate-800 text-white text-xs font-bold
                   rounded-lg active:scale-95 transition-transform">
      送信
    </button>
  </section>

</main>

<!-- Bottom Nav -->
<nav class="fixed bottom-0 left-0 w-full z-40 pb-safe
            flex justify-around items-center px-2 py-2
            bg-white/80 backdrop-blur-2xl rounded-t-2xl
            border-t border-slate-200/50
            shadow-[0_-4px_12px_rgba(0,0,0,0.03)]">
  <div class="flex flex-col items-center justify-center text-amber-600 scale-105 cursor-pointer">
    <span class="material-symbols-outlined" style="font-variation-settings:'FILL' 1;">qr_code_scanner</span>
    <span class="text-[9px] font-bold uppercase tracking-wider mt-0.5">スキャン</span>
  </div>
  <a href="admin.html"
     class="flex flex-col items-center justify-center text-slate-400 hover:text-slate-600 transition-colors p-2">
    <span class="material-symbols-outlined">dashboard</span>
    <span class="text-[9px] font-bold uppercase tracking-wider mt-0.5">管理者</span>
  </a>
</nav>

<script src="config.js"></script>
<script>
let html5QrcodeScanner = null;
let scanning     = false;
let selectedMenu = null;
let menuData     = {};
let processing   = false;
let audioCtx     = null;

/* 時計 */
setInterval(() => {
  document.getElementById('statusTime').textContent =
    new Date().toLocaleTimeString('ja-JP', { hour12: false });
}, 1000);

/* AudioContext（iOS はタップ後に初期化） */
function initAudio() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  if (audioCtx.state === 'suspended') audioCtx.resume();
}
function playTone(freq, type, startOffset, duration, vol) {
  if (!audioCtx) return;
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  const t = audioCtx.currentTime + startOffset;
  osc.type = type;
  osc.frequency.setValueAtTime(freq, t);
  osc.connect(gain); gain.connect(audioCtx.destination);
  gain.gain.setValueAtTime(0, t);
  gain.gain.linearRampToValueAtTime(vol, t + 0.02);
  gain.gain.exponentialRampToValueAtTime(0.001, t + duration);
  osc.start(t); osc.stop(t + duration + 0.05);
}
function playSound(type) {
  if (type === 'success') {
    playTone(1318.51,'sine',0,0.18,0.3); playTone(1046.50,'sine',0.22,0.22,0.3);
    playTone(1318.51,'sine',0.55,0.18,0.3); playTone(1046.50,'sine',0.77,0.28,0.3);
  } else {
    playTone(160,'sawtooth',0,0.25,0.2); playTone(140,'sawtooth',0.35,0.4,0.2);
  }
}

/* ================================================================
   【修正2】メニュー選択状態によってボタンの見た目と動作を切り替える
   ================================================================ */
function updateStartButton() {
  const btn  = document.getElementById('startBtn');
  const text = document.getElementById('startBtnText');
  const warn = document.getElementById('menuWarning');

  if (selectedMenu) {
    // メニュー選択済み → ボタンを有効化
    btn.classList.remove('disabled');
    text.textContent = 'スキャン開始';
    warn.style.display = 'none'; // 警告を隠す
  } else {
    // 未選択 → グレーアウト
    btn.classList.add('disabled');
    text.textContent = '定食を選んでください';
    warn.style.display = 'flex'; // 警告を表示
  }
}

/* メニュー読み込み */
function loadMenuStatus() {
  fetch(`${GAS_URL}?action=getMenuStatus`)
    .then(r => r.json())
    .then(data => { if (data.success) renderMenus(data.menus); })
    .catch(e => console.error(e));
}

function renderMenus(menus) {
  const grid = document.getElementById('menuGrid');
  grid.innerHTML = '';
  menus.forEach(m => {
    menuData[m.id] = m;
    const remain     = m.remain || 0;
    const isSoldOut  = remain <= 0;
    const isSelected = selectedMenu === m.id;

    let statusText, statusClass;
    if (isSoldOut)        { statusText='SOLD OUT';  statusClass='text-red-500'; }
    else if (remain <= 5) { statusText='LOW STOCK'; statusClass='text-red-500'; }
    else if (isSelected)  { statusText='SELECTED';  statusClass='text-amber-600'; }
    else                  { statusText='STANDBY';   statusClass='text-slate-400'; }

    let cardClass = 'glass-card p-3 rounded-xl text-left transition-all duration-300 flex flex-col justify-between h-28 relative overflow-hidden ';
    if      (isSelected) cardClass += 'active-glow shadow-md -translate-y-0.5';
    else if (isSoldOut)  cardClass += 'opacity-50 grayscale pointer-events-none';
    else                 cardClass += 'hover:bg-white border-white/50';

    const btn = document.createElement('button');
    btn.className = cardClass;
    btn.onclick = () => {
      selectedMenu = m.id;
      renderMenus(Object.values(menuData));
      updateStartButton(); // ← 選択時にボタン状態を更新
    };
    btn.innerHTML = `
      ${isSelected ? `<div class="absolute top-1 right-1 p-1">
        <span class="material-symbols-outlined text-amber-500 text-sm"
              style="font-variation-settings:'FILL' 1;">check_circle</span></div>` : ''}
      <div class="space-y-0.5 mt-0.5">
        <span class="text-[9px] font-bold uppercase tracking-widest ${statusClass}">${statusText}</span>
        <h3 class="font-bold text-sm tracking-tight text-slate-800 leading-tight">${m.name}</h3>
      </div>
      <div class="flex justify-between items-end w-full">
        <div class="text-[10px] text-slate-400 font-medium tracking-wide">上限 ${m.limit}</div>
        <div class="text-right leading-none">
          <span class="text-[10px] text-slate-500 font-bold mr-0.5">残</span>
          <span class="text-2xl font-black tracking-tighter
                       ${(isSoldOut||remain<=5)?'text-red-500':isSelected?'text-amber-700':'text-slate-800'}">${remain}</span>
        </div>
      </div>`;
    grid.appendChild(btn);
  });
}

/* ================================================================
   スキャン開始
   ================================================================ */
function startScan() {
  /* 【修正2】メニュー未選択なら何もしない */
  if (!selectedMenu) {
    showResult('warning', '定食を選択してください',
      'スキャンする前に上の定食ボタンをタップして選んでください');
    playSound('error');
    return;
  }
  if (scanning) return;
  initAudio();

  scanning = true;
  document.getElementById('startBtn').style.display   = 'none';
  document.getElementById('stopBtn').style.display    = 'flex';
  document.getElementById('cameraPlaceholder').style.display = 'none';

  html5QrcodeScanner = new Html5Qrcode('reader');

  /*
    ============================================================
    【修正1】スキャン枠ずれの対策
    ============================================================
    qrbox に「コンテナに対する割合」を返す関数を渡す。
    html5-qrcode は qrbox として関数を受け取れる。
    引数 (viewfinderWidth, viewfinderHeight) は
    ライブラリが実際に使っている映像サイズなので、
    そこから計算した値を返せばズレが起きない。

    - 横幅: 映像幅の 85%（バーコードが収まるように広め）
    - 高さ: 映像高さの 35%（バーコードは縦が短いので絞る）
    ============================================================
  */
  const qrboxFunction = (viewfinderWidth, viewfinderHeight) => {
    const w = Math.floor(viewfinderWidth  * 0.85);
    const h = Math.floor(viewfinderHeight * 0.35);
    return { width: w, height: h };
  };

  html5QrcodeScanner.start(
    { facingMode: 'environment' },
    {
      fps: 15,

      // ★ 固定値ではなく映像サイズ基準の関数を使う（ズレ修正の核心）
      qrbox: qrboxFunction,

      formatsToSupport: [
        Html5QrcodeSupportedFormats.QR_CODE,
        Html5QrcodeSupportedFormats.EAN_13,
        Html5QrcodeSupportedFormats.EAN_8,
        Html5QrcodeSupportedFormats.CODE_128,
        Html5QrcodeSupportedFormats.CODE_39,
        Html5QrcodeSupportedFormats.UPC_A,
        Html5QrcodeSupportedFormats.UPC_E,
      ],

      videoConstraints: {
        facingMode: { ideal: 'environment' },
        width:  { ideal: 1280 },
        height: { ideal: 720 },
      },

      aspectRatio: 1.777,
    },
    (decodedText) => {
      if (processing) return;
      stopScan();
      processCard(decodedText);
    },
    () => {}
  ).catch(err => {
    showResult('error', 'カメラエラー',
      `カメラを起動できませんでした。\n手動入力をご利用ください。\n\n${err}`);
    stopScan();
  });
}

function stopScan() {
  scanning = false;
  document.getElementById('startBtn').style.display = 'flex';
  document.getElementById('stopBtn').style.display  = 'none';
  document.getElementById('cameraPlaceholder').style.display = 'flex';
  if (html5QrcodeScanner) {
    html5QrcodeScanner.stop().catch(() => {});
    html5QrcodeScanner = null;
  }
}

function manualScan() {
  /* 手動入力もメニュー未選択チェック */
  if (!selectedMenu) {
    showResult('warning', '定食を選択してください',
      '先に定食を選択してから入力してください');
    return;
  }
  const val = document.getElementById('manualCardId').value.trim();
  if (!val) { alert('カードIDを入力してください'); return; }
  document.getElementById('manualCardId').value = '';
  initAudio();
  processCard(val);
}

/* GAS 送信 */
async function processCard(cardId) {
  if (processing) return;
  processing = true;
  const overlay = document.getElementById('processingOverlay');
  overlay.classList.remove('hidden');
  overlay.classList.add('flex');
  try {
    const res  = await fetch(GAS_URL, {
      method: 'POST',
      body:   JSON.stringify({ cardId, menuId: selectedMenu })
    });
    const data = await res.json();
    overlay.classList.add('hidden');
    overlay.classList.remove('flex');
    processing = false;
    if (data.success) {
      showResult('success', '受付完了',
        `${data.menuName}\n${data.currentCount} / ${data.limit} 食 を受け付けました`, cardId);
      playSound('success');
      if (navigator.vibrate) navigator.vibrate([200]);
    } else if (data.code === 'DUPLICATE') {
      showResult('error', '重複読取エラー', data.message, cardId);
      playSound('error');
      if (navigator.vibrate) navigator.vibrate([100,50,100]);
    } else {
      showResult('error', 'エラー発生', data.message || '処理に失敗しました', cardId);
      playSound('error');
      if (navigator.vibrate) navigator.vibrate([300]);
    }
    await loadMenuStatus();
    setTimeout(() => window.location.reload(), 3500);
  } catch(err) {
    overlay.classList.add('hidden');
    overlay.classList.remove('flex');
    processing = false;
    showResult('error', '通信エラー', err.message || 'ネットワークを確認してください', cardId);
    playSound('error');
    setTimeout(() => window.location.reload(), 3500);
  }
}

/* トースト */
function showResult(type, title, detail, cardId = '') {
  const toast = document.getElementById('toast');
  let colorClass, bgClass, icon;
  if (type === 'success') {
    colorClass='text-emerald-700'; bgClass='bg-emerald-50 border-emerald-200'; icon='check_circle';
  } else if (type === 'error') {
    colorClass='text-red-700'; bgClass='bg-red-50 border-red-200'; icon='error';
  } else {
    colorClass='text-amber-700'; bgClass='bg-amber-50 border-amber-200'; icon='warning';
  }
  toast.className = `fixed top-20 left-1/2 -translate-x-1/2 z-50 p-4 rounded-xl shadow-2xl
                     transition-all duration-300 transform translate-y-0 opacity-100
                     max-w-[90%] w-full border ${bgClass} flex items-start gap-3 backdrop-blur-md`;
  toast.innerHTML = `
    <div class="${colorClass} mt-0.5">
      <span class="material-symbols-outlined" style="font-variation-settings:'FILL' 1;">${icon}</span>
    </div>
    <div class="flex-1">
      <h4 class="font-bold text-sm ${colorClass} tracking-tight">${title}</h4>
      <p class="text-[11px] font-medium text-slate-600 mt-1 leading-relaxed whitespace-pre-wrap">${detail}</p>
      ${cardId ? `<div class="mt-2 text-[10px] font-mono text-slate-500 bg-black/5 px-2 py-0.5 rounded inline-block">ID: ${cardId}</div>` : ''}
    </div>`;
  if (window.toastTimer) clearTimeout(window.toastTimer);
  window.toastTimer = setTimeout(() => {
    toast.classList.remove('translate-y-0','opacity-100');
    toast.classList.add('-translate-y-4','opacity-0','pointer-events-none');
  }, 4000);
}

/* 初期化 */
loadMenuStatus();
updateStartButton(); // ← 初期状態はグレーアウト
setInterval(loadMenuStatus, 30000);
</script>
</body>
</html>
