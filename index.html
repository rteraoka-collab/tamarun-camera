<!--
  ========================================================
  【重要】html5-qrcode について
  ========================================================
  html5-qrcode の最新版 (2.3.8) は iPhone Safari で
  "OverconstrainedError" が発生してカメラが起動しない
  バグが報告されています。
  
  そのため、本ファイルでは ZXing-js/browser を
  メインライブラリとして使用します。
  ZXing は iOS Safari 16.4+ で安定動作が確認されています。
  ========================================================
-->
<!-- ZXing-js: QR/EAN/CODE128 対応の安定ライブラリ -->
<script src="https://cdn.jsdelivr.net/npm/@zxing/browser@0.1.5/umd/index.min.js"></script>
<!-- フォールバック用に html5-qrcode も読み込む -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/html5-qrcode/2.3.8/html5-qrcode.min.js"></script>

<script>
tailwind.config = {

<style>
  /* ====== グラスカード ====== */
  .glass-card {
    background: rgba(255,255,255,0.75);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px); /* iOS Safari 必須 */
    border: 1px solid rgba(255,255,255,0.25);
    box-shadow: 0 8px 32px 0 rgba(0,0,0,0.05);
  }

  /* ====== 選択時のメニューカード光彩 ====== */
  .active-glow {
    box-shadow: 0 0 0 2px #f0a500, 0 0 18px 4px rgba(240,165,0,0.35);
    background: linear-gradient(135deg, rgba(255,255,255,0.95), rgba(255,243,200,0.95));
  }

  /* ====== Material Icons 統一設定 ====== */
  .material-symbols-outlined {
    font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
    vertical-align: middle;
  }

  /*
    ========================================================
    iPhone Safari カメラ向け CSS
    ========================================================
    - video タグに width/height を明示しないと
      iOS Safari で映像が表示されないことがある
    - object-fit: cover でビューポートを埋める
    ========================================================
  */
  #videoPreview {
    width: 100%;
    height: 100%;
    object-fit: cover;
    border-radius: 1rem;
    /* iOS Safari でのちらつき防止 */
    -webkit-transform: translateZ(0);
    transform: translateZ(0);
    /* 縦長動画が横にはみ出ないようにクリップ */
    display: block;
  }

  /* スキャン枠のアニメーションライン */
  @keyframes scanLine {
    0%   { top: 10%; opacity: 1; }
    50%  { top: 85%; opacity: 0.8; }
    100% { top: 10%; opacity: 1; }
  }
  .scan-line {
    animation: scanLine 2.5s ease-in-out infinite;
  }

  /* トースト表示トランジション */
  #toast {
    transition: all 0.35s cubic-bezier(0.34, 1.56, 0.64, 1);
  }

  /* ローディングスピナー */
  @keyframes spin { to { transform: rotate(360deg); } }
  .spinner { animation: spin 0.8s linear infinite; }

  /* iOS safe-area 対応 */
  @supports (padding-bottom: env(safe-area-inset-bottom)) {
    .pb-safe { padding-bottom: max(1rem, env(safe-area-inset-bottom)); }
  }
</style>
</head>

      <!-- カメラ停止中のプレースホルダー -->

<!-- config.js を読み込む（GAS_URL が定義されている） -->
<script src="config.js"></script>

<script>
/*
  ================================================================
  たまルン スキャン画面 — メインスクリプト
  ================================================================
  
  【iPhone Safari 対応のポイント まとめ】
  
  1. getUserMedia の constraints を段階的に試す
     → 一番厳格な設定から始め、失敗したら緩い設定に fallback
  
  2. video タグの属性
     → autoplay / muted / playsinline / webkit-playsinline が全て必要
     → JS からも video.play() を明示的に呼ぶ
  
  3. ZXing-js を使う
     → html5-qrcode の最新版は iOS で OverconstrainedError が出やすい
     → ZXing の BrowserMultiFormatReader は iOS Safari 16.4+ で安定
  
  4. カメラ起動は必ずユーザー操作（タップ）から
     → iOS Safari は autoplay でカメラが起動しない（セキュリティ制限）
  
  5. AudioContext も tap から初期化
     → iOS Safari は tap 前に AudioContext を作ると suspended のまま
  ================================================================
*/

/* ---- グローバル変数 ---- */
let scanning      = false;   // スキャン中フラグ
let selectedMenu  = null;    // 選択中の定食ID（"A"〜"D"）
let menuData      = {};      // メニューデータキャッシュ
let processing    = false;   // GAS送信中フラグ
let audioCtx      = null;    // AudioContext（タップ後に初期化）
let codeReader    = null;    // ZXing のリーダーインスタンス
let h5Scanner     = null;    // html5-qrcode のフォールバック用
let currentStream = null;    // MediaStream（停止時に使う）
let usingZxing    = true;    // true=ZXing, false=html5-qrcode

/* ---- デバッグ用ログ関数 ---- */
function dbg(msg) {
  console.log('[Tamarun]', msg);
  // デバッグセクションを表示したい場合は下行のコメントを外す
  // document.getElementById('debugSection').classList.remove('hidden');
  const el = document.getElementById('debugLog');
  const line = document.createElement('div');
  line.textContent = `${new Date().toLocaleTimeString('ja-JP', {hour12:false})} ${msg}`;
  el.prepend(line);
  if (el.children.length > 30) el.lastChild.remove();
}

/* ================================================================
   時計
   ================================================================ */
setInterval(() => {
  document.getElementById('statusTime').textContent =
    new Date().toLocaleTimeString('ja-JP', { hour12: false });
}, 1000);

/* ================================================================
   AudioContext 初期化 / 効果音
   ================================================================ */
function initAudio() {
  if (!audioCtx) {
    try {
      audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      dbg('AudioContext initialized');
    } catch(e) {
      dbg('AudioContext failed: ' + e);
    }
  }
  // iOS Safari は suspended 状態で始まる。resume() が必要
  if (audioCtx && audioCtx.state === 'suspended') {
    audioCtx.resume().then(() => dbg('AudioContext resumed'));
  }
}

/* 単音生成ヘルパー */
function playTone(freq, type, startOffset, duration, vol) {
  if (!audioCtx) return;
  try {
    const osc  = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    const t    = audioCtx.currentTime + startOffset;

    osc.type = type;
    osc.frequency.setValueAtTime(freq, t);
    osc.connect(gain);
    gain.connect(audioCtx.destination);

    gain.gain.setValueAtTime(0, t);
    gain.gain.linearRampToValueAtTime(vol, t + 0.02);
    gain.gain.exponentialRampToValueAtTime(0.001, t + duration);

    osc.start(t);
    osc.stop(t + duration + 0.05);
  } catch(e) { /* 無視 */ }
}

function playSound(type) {
  if (type === 'success') {
    // ピンポン × 2
    playTone(1318.51, 'sine', 0,    0.18, 0.3);
    playTone(1046.50, 'sine', 0.22, 0.22, 0.3);
    playTone(1318.51, 'sine', 0.55, 0.18, 0.3);
    playTone(1046.50, 'sine', 0.77, 0.28, 0.3);
  } else {
    // ブブー
    playTone(160, 'sawtooth', 0,   0.25, 0.2);
    playTone(140, 'sawtooth', 0.35, 0.4, 0.2);
  }
}

/* ================================================================
   メニュー読み込み / 描画
   ================================================================ */
async function loadMenuStatus() {
  try {
    const res  = await fetch(`${GAS_URL}?action=getMenuStatus`);
    const data = await res.json();
    if (data.success) {
      renderMenus(data.menus);
      dbg('Menu loaded: ' + data.menus.length + ' items');
    }
  } catch(e) {
    dbg('loadMenuStatus error: ' + e);
  }
}

function renderMenus(menus) {
  const grid = document.getElementById('menuGrid');
  grid.innerHTML = '';

  menus.forEach(m => {
    menuData[m.id] = m;
    const remain     = m.remain || 0;
    const isSoldOut  = remain <= 0;
    const isSelected = selectedMenu === m.id;

    let statusText, statusClass;
    if (isSoldOut)   { statusText = 'SOLD OUT';  statusClass = 'text-red-500'; }
    else if (remain <= 5) { statusText = 'LOW STOCK'; statusClass = 'text-red-500'; }
    else if (isSelected)  { statusText = 'SELECTED';  statusClass = 'text-amber-600'; }
    else                  { statusText = 'STANDBY';   statusClass = 'text-slate-400'; }

    let cardClass = 'glass-card p-3 rounded-xl flex flex-col justify-between h-28 relative overflow-hidden transition-all duration-300 ';
    if      (isSelected) cardClass += 'active-glow -translate-y-0.5';
    else if (isSoldOut)  cardClass += 'opacity-40 grayscale pointer-events-none';
    else                 cardClass += 'hover:bg-white/90 border-white/50';

    const btn = document.createElement('button');
    btn.className = cardClass;
    btn.setAttribute('aria-pressed', isSelected ? 'true' : 'false');
    btn.onclick = () => { selectMenu(m.id); };
    btn.innerHTML = `
      ${isSelected ? `<div class="absolute top-1.5 right-1.5">
        <span class="material-symbols-outlined text-amber-500 text-base"
              style="font-variation-settings:'FILL' 1;">check_circle</span>
      </div>` : ''}
      <div class="space-y-0.5">
        <span class="text-[9px] font-bold uppercase tracking-widest ${statusClass}">${statusText}</span>
        <h3 class="font-bold text-sm tracking-tight text-slate-800 leading-tight">${m.name}</h3>
      </div>
      <div class="flex justify-between items-end w-full">
        <span class="text-[10px] text-slate-400 font-medium">上限 ${m.limit}</span>
        <div class="leading-none text-right">
          <span class="text-[10px] text-slate-500 font-bold mr-0.5">残</span>
          <span class="text-2xl font-black tracking-tighter
                       ${(isSoldOut || remain <= 5) ? 'text-red-500' : isSelected ? 'text-amber-700' : 'text-slate-800'}">${remain}</span>
        </div>
      </div>
    `;
    grid.appendChild(btn);
  });
}

function selectMenu(id) {
  selectedMenu = id;
  dbg('Menu selected: ' + id);
  renderMenus(Object.values(menuData));
}

/* ================================================================
   カメラ起動 — iPhone Safari 対応版
   ================================================================
   
   iOS Safari の制約:
   - getUserMedia は HTTPS + ユーザー操作が必要
   - facingMode: { exact: 'environment' } だと OverconstrainedError
     → exact を外して { ideal: 'environment' } にする
   - width/height の exact 指定も OverconstrainedError の原因になる
     → ideal + min の組み合わせにする
   - torch (フラッシュライト) は iOS 未対応
   ================================================================ */

/* カメラの制約設定（段階的 fallback 用配列） */
const CAMERA_CONSTRAINTS = [
  /*
    [設定1] 最もバランスが良い設定
    - facingMode: ideal でエラーを防ぐ
    - 高解像度を ideal で要求（強制ではない）
    - iOS 17+ ではオートフォーカス有効化のために
      focusMode を continuous に設定
  */
  {
    video: {
      facingMode: { ideal: 'environment' },
      width:  { ideal: 1920, min: 640 },
      height: { ideal: 1080, min: 480 },
      frameRate: { ideal: 30, min: 15 },
      // iOS Safari 17+ のオートフォーカス設定
      focusMode: 'continuous',
      // Android Chrome 向け高解像度モード
      advanced: [{ zoom: 1.0 }]
    }
  },
  /*
    [設定2] シンプルな設定（設定1 で失敗した場合）
    - exact を一切使わない
  */
  {
    video: {
      facingMode: 'environment',
      width:  { ideal: 1280 },
      height: { ideal: 720 }
    }
  },
  /*
    [設定3] 最小限の設定（設定2 でも失敗した場合）
    - 解像度指定なし・カメラ向き指定なし
    - ほぼ全端末で動作するはず
  */
  {
    video: true
  }
];

async function tryGetUserMedia() {
  let lastError = null;
  for (let i = 0; i < CAMERA_CONSTRAINTS.length; i++) {
    try {
      dbg(`Trying camera constraint [${i}]`);
      const stream = await navigator.mediaDevices.getUserMedia(CAMERA_CONSTRAINTS[i]);
      dbg(`Camera started with constraint [${i}]`);
      return stream;
    } catch(e) {
      dbg(`Constraint [${i}] failed: ${e.name} - ${e.message}`);
      lastError = e;
    }
  }
  throw lastError; // 全部失敗
}

/* ================================================================
   ZXing でスキャン開始
   ================================================================ */
async function startScanWithZXing() {
  try {
    /*
      ZXing の BrowserMultiFormatReader を使う。
      - decodeFromVideoElement() はカメラ起動も兼ねる
      - ただし iOS Safari では constraints が細かく指定できないため
        先に getUserMedia でストリームを取得し、
        decodeFromStream() に渡す方法を使う。
    */
    codeReader = new ZXingBrowser.BrowserMultiFormatReader();

    // 対応フォーマットを明示（読み取り速度向上のため）
    const hints = new Map();
    hints.set(ZXingBrowser.DecodeHintType, [
      ZXingBrowser.BarcodeFormat.QR_CODE,
      ZXingBrowser.BarcodeFormat.EAN_13,
      ZXingBrowser.BarcodeFormat.EAN_8,
      ZXingBrowser.BarcodeFormat.CODE_128,
      ZXingBrowser.BarcodeFormat.CODE_39,
      ZXingBrowser.BarcodeFormat.UPC_A,
      ZXingBrowser.BarcodeFormat.UPC_E,
    ]);

    // カメラストリームを取得
    currentStream = await tryGetUserMedia();

    const video = document.getElementById('videoPreview');

    // iOS Safari では srcObject のセット後に play() が必要
    video.srcObject = currentStream;
    await video.play().catch(e => dbg('video.play() error: ' + e));

    dbg('ZXing: video playing, starting decode loop');
    document.getElementById('cameraPlaceholder').style.display = 'none';

    /*
      decodeFromVideoElementContinuously:
      - video 要素からリアルタイムでデコードし続ける
      - 成功 or エラーのたびにコールバックが呼ばれる
      - iOS Safari では低 FPS になることがあるが動作はする
    */
    codeReader.decodeFromVideoElement(video, (result, err) => {
      if (result) {
        dbg('ZXing decoded: ' + result.getText());
        // 読み取り成功
        onScanSuccess(result.getText());
      }
      // エラーは毎フレーム発生するので無視（NotFoundException は正常）
    });

    usingZxing = true;
    dbg('ZXing scan started');
  } catch(e) {
    dbg('ZXing failed, falling back to html5-qrcode: ' + e);
    // ZXing が失敗した場合は html5-qrcode にフォールバック
    await startScanWithHtml5Qrcode();
  }
}

/* ================================================================
   html5-qrcode でスキャン開始（フォールバック）
   ================================================================ */
async function startScanWithHtml5Qrcode() {
  try {
    dbg('Starting html5-qrcode fallback');

    // html5-qrcode 用の div を video の上に重ねる
    const readerDiv = document.getElementById('h5readerDiv');
    if (!readerDiv) {
      const div = document.createElement('div');
      div.id = 'h5readerDiv';
      div.className = 'absolute inset-0 z-5';
      document.getElementById('videoPreview').parentElement.appendChild(div);
    }

    h5Scanner = new Html5Qrcode('h5readerDiv');

    const config = {
      fps: 15,
      // iOS は qrbox を小さくすると読み取りやすい
      qrbox: { width: 240, height: 110 },
      // 対応フォーマット
      formatsToSupport: [
        Html5QrcodeSupportedFormats.QR_CODE,
        Html5QrcodeSupportedFormats.EAN_13,
        Html5QrcodeSupportedFormats.EAN_8,
        Html5QrcodeSupportedFormats.CODE_128,
        Html5QrcodeSupportedFormats.CODE_39,
        Html5QrcodeSupportedFormats.UPC_A,
        Html5QrcodeSupportedFormats.UPC_E,
      ],
      // iOS Safari での OverconstrainedError 回避
      // facingMode の exact を使わない
      videoConstraints: {
        facingMode: { ideal: 'environment' },
        width: { ideal: 1280 },
        height: { ideal: 720 },
      },
      aspectRatio: 1.333,
    };

    await h5Scanner.start(
      { facingMode: { ideal: 'environment' } },
      config,
      (decodedText) => {
        dbg('html5-qrcode decoded: ' + decodedText);
        onScanSuccess(decodedText);
      },
      () => {} // エラーは毎フレーム来るので無視
    );

    usingZxing = false;
    document.getElementById('cameraPlaceholder').style.display = 'none';
    dbg('html5-qrcode started');
  } catch(e) {
    dbg('html5-qrcode also failed: ' + e);
    showToast('error', 'カメラエラー',
      `カメラを起動できませんでした。\n手動入力をご利用ください。\n\n詳細: ${e.message}`);
    stopScan();
  }
}

/* ================================================================
   スキャン開始（ボタン押下時に呼ばれる）
   ================================================================ */
async function startScan() {
  if (scanning) return;

  // iOS Safari: ユーザー操作のコンテキストで AudioContext を初期化
  initAudio();

  scanning = true;
  document.getElementById('startBtn').style.display = 'none';
  document.getElementById('stopBtn').style.display  = 'flex';

  // getUserMedia が使えるか確認
  if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
    showToast('error', 'カメラ非対応',
      'このブラウザはカメラに対応していません。\n手動入力をご利用ください。');
    stopScan();
    return;
  }

  // ZXing でスキャン開始（失敗時は html5-qrcode にフォールバック）
  await startScanWithZXing();
}

/* ================================================================
   スキャン停止
   ================================================================ */
function stopScan() {
  scanning = false;
  document.getElementById('startBtn').style.display = 'flex';
  document.getElementById('stopBtn').style.display  = 'none';
  document.getElementById('cameraPlaceholder').style.display = 'flex';

  // ZXing を停止
  if (codeReader) {
    try { codeReader.reset(); } catch(e) {}
    codeReader = null;
  }

  // html5-qrcode を停止
  if (h5Scanner) {
    try { h5Scanner.stop().catch(() => {}); } catch(e) {}
    h5Scanner = null;
  }

  // MediaStream のトラックを全停止（カメラインジケーターが消える）
  if (currentStream) {
    currentStream.getTracks().forEach(track => track.stop());
    currentStream = null;
  }

  // video のソースをクリア
  const video = document.getElementById('videoPreview');
  video.srcObject = null;

  dbg('Scan stopped');
}

/* ================================================================
   スキャン成功コールバック
   ================================================================ */
function onScanSuccess(decodedText) {
  // 処理中は無視（二重読み取り防止）
  if (processing) return;

  dbg('Scan success: ' + decodedText);
  stopScan();
  processCard(decodedText.trim());
}

/* ================================================================
   手動入力からの送信
   ================================================================ */
function manualSubmit() {
  const val = document.getElementById('manualCardId').value.trim();
  if (!val) {
    showToast('warning', '入力エラー', 'カードIDを入力してください');
    return;
  }
  document.getElementById('manualCardId').value = '';
  initAudio();
  processCard(val);
}

/* ================================================================
   GAS へ POST 送信
   ================================================================ */
async function processCard(cardId) {
  if (processing) return;

  // メニュー未選択チェック
  if (!selectedMenu) {
    showToast('error', 'メニュー未選択', '先に定食を選択してください');
    playSound('error');
    if (navigator.vibrate) navigator.vibrate([100, 50, 100]);
    return;
  }

  processing = true;
  const overlay = document.getElementById('processingOverlay');
  overlay.classList.remove('hidden');
  overlay.classList.add('flex');

  dbg(`Sending cardId=${cardId}, menuId=${selectedMenu} to GAS`);

  try {
    /*
      GAS へ POST リクエスト。
      - mode: 'no-cors' は使わない（レスポンスが読めなくなる）
      - GAS 側で CORS ヘッダーは不要（ContentService が自動付与）
      - Content-Type を application/json にすると
        GAS 側で e.postData.contents が取得できる
    */
    const res = await fetch(GAS_URL, {
      method: 'POST',
      // iOS Safari での CORS プリフライト回避のために
      // headers は最小限にする
      body: JSON.stringify({ cardId, menuId: selectedMenu })
    });

    if (!res.ok) {
      throw new Error(`HTTP ${res.status}: ${res.statusText}`);
    }

    const data = await res.json();
    dbg('GAS response: ' + JSON.stringify(data));

    // オーバーレイを閉じる
    overlay.classList.add('hidden');
    overlay.classList.remove('flex');
    processing = false;

    if (data.success) {
      showToast('success', '受付完了',
        `${data.menuName}\n${data.currentCount} / ${data.limit} 食 受付済み`);
      playSound('success');
      if (navigator.vibrate) navigator.vibrate([200]);
    } else if (data.code === 'DUPLICATE') {
      showToast('warning', '重複読取', data.message);
      playSound('error');
      if (navigator.vibrate) navigator.vibrate([100, 50, 100]);
    } else if (data.code === 'SOLD_OUT') {
      showToast('error', '完売', data.message);
      playSound('error');
      if (navigator.vibrate) navigator.vibrate([400]);
    } else {
      showToast('error', 'エラー', data.message || '処理に失敗しました');
      playSound('error');
    }

    // メニューを再読み込み（残数を更新）
    await loadMenuStatus();

    // 3.5秒後にリロード（次のスキャンに備える）
    setTimeout(() => window.location.reload(), 3500);

  } catch(e) {
    overlay.classList.add('hidden');
    overlay.classList.remove('flex');
    processing = false;
    dbg('processCard error: ' + e);
    showToast('error', '通信エラー',
      `GASへの送信に失敗しました。\nURLを確認してください。\n\n${e.message}`);
    playSound('error');
    setTimeout(() => window.location.reload(), 3500);
  }
}

/* ================================================================
   トースト通知表示
   ================================================================ */
function showToast(type, title, msg) {
  const toast = document.getElementById('toast');
  let colorClass, bgClass, icon;

  if (type === 'success') {
    colorClass = 'text-emerald-700';
    bgClass    = 'bg-emerald-50 border-emerald-200';
    icon       = 'check_circle';
  } else if (type === 'error') {
    colorClass = 'text-red-700';
    bgClass    = 'bg-red-50 border-red-200';
    icon       = 'error';
  } else {
    colorClass = 'text-amber-700';
    bgClass    = 'bg-amber-50 border-amber-200';
    icon       = 'info';
  }

  toast.className = `
    fixed top-16 left-1/2 -translate-x-1/2 z-50
    p-4 rounded-2xl shadow-2xl backdrop-blur-md
    opacity-100 translate-y-0
    max-w-[92vw] w-full border
    flex items-start gap-3
    ${bgClass}
  `;

  toast.innerHTML = `
    <div class="${colorClass} mt-0.5 flex-shrink-0">
      <span class="material-symbols-outlined text-xl"
            style="font-variation-settings:'FILL' 1;">${icon}</span>
    </div>
    <div class="flex-1 min-w-0">
      <h4 class="font-bold text-sm ${colorClass} tracking-tight">${title}</h4>
      <p class="text-[11px] font-medium text-slate-600 mt-1 leading-relaxed whitespace-pre-wrap">${msg}</p>
    </div>
  `;

  if (window.toastTimer) clearTimeout(window.toastTimer);
  window.toastTimer = setTimeout(() => {
    toast.classList.add('opacity-0', '-translate-y-2');
    toast.classList.remove('opacity-100', 'translate-y-0');
  }, 5000);
}

/* ================================================================
   初期化
   ================================================================ */
// メニューを即時読み込み
loadMenuStatus();

// 30秒ごとに自動更新
setInterval(loadMenuStatus, 30000);

dbg('App initialized. GAS_URL: ' + (typeof GAS_URL !== 'undefined' ? GAS_URL.slice(0, 40) + '...' : 'NOT DEFINED'));

// config.js が読めていない場合の警告
if (typeof GAS_URL === 'undefined') {
  showToast('error', '設定エラー',
    'config.js が読み込めていません。\nGAS_URL が未定義です。');
}
</script>
