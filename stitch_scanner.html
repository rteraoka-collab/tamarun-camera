<span class="w-2 h-2 bg-emerald-500 rounded-full"></span>

</div>

<button class="glass-card active-glow p-md rounded-xl text-left transition-all duration-300 flex flex-col justify-between h-32 relative overflow-hidden">
<div class="absolute top-0 right-0 p-1">
<span class="material-symbols-outlined text-amber-500 text-sm" style="font-variation-settings: 'FILL' 1;">check_circle</span>
</div>

<span class="font-label-caps text-amber-600 block">SELECTED</span>
<h3 class="font-title-sm text-on-surface">A定食(日替わり)</h3>
</div>
<div class="flex justify-between items-end">
<div class="text-[10px] text-slate-500">上限 100</div>
<div class="text-right">
<span class="text-xs text-slate-500">残</span>
<span class="font-headline-md text-primary">25</span>
</div>
</div>
</button>

</div>

<span class="font-label-caps text-slate-400 block">STANDBY</span>
<h3 class="font-title-sm text-on-surface">C定食(チキンカツ)</h3>
</div>
<div class="flex justify-between items-end">
<div class="text-[10px] text-slate-500">上限 50</div>
<div class="text-right">
<span class="text-xs text-slate-500">残</span>
<span class="font-headline-md text-on-surface">40</span>

</div>

<div class="text-[10px] text-slate-500">上限 50</div>
<div class="text-right">
<span class="text-xs text-slate-500">残</span>
<span class="font-headline-md text-error">5</span>
</div>

<div class="w-full h-1 bg-amber-500/80 absolute top-1/2 -translate-y-1/2 shadow-[0_0_15px_#f0a500] animate-pulse"></div>
</div>
<div class="absolute bottom-4 left-0 w-full text-center">
<p class="text-white/80 text-xs font-bold tracking-widest">バーコードを枠内に合わせてください</p>
</div></div>

<button class="px-6 py-2 bg-slate-800 text-white font-bold rounded-lg active:opacity-80 transition-all">

<span class="font-plus-jakarta-sans text-[10px] font-semibold uppercase tracking-wider">スキャン</span>

<a class="flex flex-col items-center justify-center text-slate-400 opacity-80 transition-transform duration-200 active:scale-90" href="#">
<span class="material-symbols-outlined" data-icon="account_balance_wallet">account_balance_wallet</span>
